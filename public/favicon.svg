<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- K: the < bracket in sky-blue forms the angular strokes of the K -->
  <!-- Vertical stem of K -->
  <line x1="5" y1="8" x2="5" y2="24" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <!-- < bracket as the arm of K in accent blue -->
  <path d="M14 8 L7 16 L14 24" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- M (top aligned with K, gap above underline) -->
  <path d="M18 20 L18 8 L22.5 15 L27 8 L27 20" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cursor underline even with bottom of K (y=24) -->
  <line x1="18" y1="24" x2="27" y2="24" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
</svg>
